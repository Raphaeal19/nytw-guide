services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: eventintel
      POSTGRES_PASSWORD: password
      POSTGRES_DB: eventintel
    ports:
      - "5433:5432"   # 5433 on host to avoid conflict with local Homebrew Postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
